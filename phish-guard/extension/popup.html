<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhishGuard</title>
  <style>
    /* ── Fonts & Reset ── */
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --border:    #252a35;
      --text:      #e8eaf0;
      --muted:     #7a8099;
      --accent:    #4f9cf9;
      --danger:    #e74c3c;
      --warn:      #f39c12;
      --safe:      #27ae60;
    }

    body {
      width: 360px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .header-logo span { color: var(--text); }
    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── Current URL bar ── */
    .current-url-bar {
      padding: 10px 16px;
      background: #0a0c10;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .current-url-bar .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    #current-url-text {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Tab Panels ── */
    .tab-panel { display: none; padding: 14px 16px; }
    .tab-panel.active { display: block; }

    /* ── URL Input ── */
    .input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--muted); }

    .scan-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .scan-btn:hover { opacity: 0.85; }

    /* ── URL Result ── */
    #url-result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      min-height: 80px;
    }
    .score-badge {
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
      border-radius: 6px;
      padding: 6px 12px;
      margin-bottom: 8px;
    }
    .score-number {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }
    .score-label { color: rgba(255,255,255,0.7); font-size: 13px; }
    .risk-level {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .reasons {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .reasons li {
      font-size: 11.5px;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
      padding: 5px 8px;
      border-left: 2px solid var(--warn);
    }
    .safe-msg { color: var(--safe); font-size: 12px; font-weight: 600; }

    /* ── Email Tab ── */
    .email-input {
      width: 100%;
      height: 110px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      resize: vertical;
      outline: none;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .email-input:focus { border-color: var(--accent); }
    .email-input::placeholder { color: var(--muted); }

    .analyze-btn {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 6px;
      padding: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .analyze-btn:hover { background: var(--accent); color: #fff; }

    /* ── Email Results ── */
    #email-results {
      min-height: 40px;
    }
    .email-score-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .email-risk { font-weight: 700; font-size: 13px; }
    .email-score-num { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; }
    .summary { color: var(--muted); font-size: 12px; margin-bottom: 10px; }

    .flags-section, .safe-section, .verdict {
      background: var(--surface);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .flags-section h4, .safe-section h4, .verdict h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .flags-section ul, .safe-section ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .flags-section li { color: var(--danger); font-size: 11.5px; }
    .safe-section  li { color: var(--safe);   font-size: 11.5px; }
    .verdict p { color: var(--muted); font-size: 11.5px; line-height: 1.6; }

    /* ── Utility ── */
    .loading { color: var(--accent); font-size: 12px; padding: 8px 0; }
    .error   { color: var(--danger); font-size: 12px; padding: 8px 0; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">🛡 Phish<span>Guard</span></div>
    <div class="header-sub">v1.0 · Hackathon Edition</div>
  </div>

  <!-- Current tab URL indicator -->
  <div class="current-url-bar">
    <div class="dot"></div>
    <div id="current-url-text">Scanning current tab...</div>
  </div>

  <!-- Tab switcher -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="url-tab">🔗 URL Scanner</button>
    <button class="tab-btn"        data-tab="email-tab">📧 Email Analyzer</button>
  </div>

  <!-- URL Tab -->
  <div class="tab-panel active" id="url-tab">
    <div class="input-row">
      <input
        id="url-input"
        class="url-input"
        type="text"
        placeholder="Paste any URL to scan..."
      />
      <button id="scan-btn" class="scan-btn">Scan</button>
    </div>
    <div id="url-result">
      <p style="color:var(--muted); font-size:12px;">Scanning current tab URL above...</p>
    </div>
  </div>

  <!-- Email Tab -->
  <div class="tab-panel" id="email-tab">
    <textarea
      id="email-input"
      class="email-input"
      placeholder="Paste the full email here (subject, sender, body)..."
    ></textarea>
    <button id="analyze-email-btn" class="analyze-btn">✨ Analyze with AI</button>
    <div id="email-results"></div>
  </div>

  <!-- Load our JS files -->
  <!-- scorer.js and email-analyzer.js must be loaded before popup.js -->
  <script src="scorer.js"></script>
  <script src="virustotal.js"></script>
  <script src="email-analyzer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
